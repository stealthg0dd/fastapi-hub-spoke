# Alembic configuration for fastapi-hub-spoke
# Run from the project root:  alembic upgrade head
[alembic]
script_location = migrations

# The URL is overridden in migrations/env.py from core.config.settings
# so this value is a non-functional placeholder.
sqlalchemy.url = postgresql+asyncpg://postgres:Neufin%232026@db.gpczchjipalfgkfqamcu.supabase.co:5432/postgres

# Prepend the shared_services directory to sys.path so env.py can
# import application modules (core.config, core.database, models.*).
prepend_sys_path = shared_services

version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

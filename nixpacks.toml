[phases.setup]
nixPkgs = ["python311", "stdenv.cc.cc.lib", "zlib"]

[phases.install]
cmds = [
    # 1. Create a virtual environment in /app/venv
    "python3.11 -m venv /app/venv",
    # 2. Upgrade pip inside the writable venv
    "/app/venv/bin/pip install --upgrade pip",
    # 3. Install requirements into the venv
    "/app/venv/bin/pip install -r backend/shared_services/requirements.txt"
]

[phases.build]
cmds = ["chmod +x /app/start.sh"]

[start]
cmd = "bash /app/start.sh"
[phases.setup]
# Removed everything except the bare essentials.
# Railway's Python 3.11 setup usually handles the rest.
nixPkgs = ["python311", "stdenv.cc.cc.lib", "zlib"]

[phases.install]
cmds = [
    "pip install --break-system-packages --prefix=/app/.local -r backend/shared_services/requirements.txt"
]

[phases.build]
cmds = ["chmod +x /app/start.sh"]

[start]
cmd = "bash /app/start.sh"
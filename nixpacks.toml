[phases.setup]
# Removed 'cacert' to avoid the file conflict error
nixPkgs = ["python311", "python311Packages.pip", "stdenv.cc.cc.lib", "zlib"]

[phases.install]
cmds = [
    "pip install --break-system-packages --prefix=/app/.local -r backend/shared_services/requirements.txt"
]

[phases.build]
cmds = ["chmod +x /app/start.sh"]

[start]
cmd = "bash /app/start.sh"
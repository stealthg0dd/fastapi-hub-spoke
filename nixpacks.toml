[phases.setup]
nixPkgs = ["python311", "stdenv.cc.cc.lib", "zlib", "postgresql"]

[phases.install]
cmds = [
    "python3.11 -m venv /app/venv",
    "/app/venv/bin/pip install --upgrade pip",
    "/app/venv/bin/pip install -r backend/shared_services/requirements.txt"
]

[phases.build]
cmds = ["chmod +x /app/start.sh"]

[start]
cmd = "bash /app/start.sh"
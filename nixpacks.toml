[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
    "python3.11 -m pip install --upgrade pip",
    "python3.11 -m pip install -r backend/shared_services/requirements.txt"
]

[start]
# We stay at /app and tell Python exactly where the library and spokes live.
cmd = "PYTHONPATH=/app/backend/shared_services:/app/backend python3.11 -m uvicorn backend.shared_services.main:app --host 0.0.0.0 --port ${PORT:-8000}"
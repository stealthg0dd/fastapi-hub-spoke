[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs"]

[phases.install]
cmds = [
    "npm install",
    "python3 -m pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
    "echo 'Building project...'"
]

[start]
cmd = "PYTHONPATH=./backend python3 -m uvicorn backend.shared_services.main:app --host 0.0.0.0 --port ${PORT:-8000}"
[phases.setup]
nixPkgs = ["python311", "stdenv.cc.cc.lib", "zlib"]

[phases.install]
cmds = [
    # Manually bootstrap pip inside the container to avoid Nix conflicts
    "python3.11 -m ensurepip",
    "python3.11 -m pip install --upgrade pip",
    "python3.11 -m pip install --break-system-packages --prefix=/app/.local -r backend/shared_services/requirements.txt"
]

[phases.build]
cmds = ["chmod +x /app/start.sh"]

[start]
cmd = "bash /app/start.sh"